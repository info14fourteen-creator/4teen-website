name: Ops Remote Runner

on:
  repository_dispatch:
    types:
      - ops-execution-request

permissions:
  contents: write

concurrency:
  group: ops-remote-runner-${{ github.event.client_payload.requestId || github.run_id }}
  cancel-in-progress: false

jobs:
  run-request:
    runs-on: ubuntu-latest
    env:
      OPS_REPO_KEY: website
      OPS_REQUEST_ID: ${{ github.event.client_payload.requestId }}
      OPS_TASK_ID: ${{ github.event.client_payload.taskId }}
      OPS_ACTION_TYPE: ${{ github.event.client_payload.actionType }}
      OPS_BASE_URL: ${{ github.event.client_payload.opsBaseUrl }}
      OPS_RUNNER_TOKEN: ${{ github.event.client_payload.runnerToken }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ops request
        run: node scripts/ops-remote-runner.mjs
