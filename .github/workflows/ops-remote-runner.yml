name: Ops Remote Runner

on:
  repository_dispatch:
    types:
      - ops-execution-request

permissions:
  contents: write

concurrency:
  group: ops-remote-runner-${{ github.event.client_payload.requestId || github.run_id }}
  cancel-in-progress: false

jobs:
  run-request:
    runs-on: ubuntu-latest
    env:
      OPS_REPO_KEY: website
      OPS_REQUEST_ID: ${{ github.event.client_payload.requestId }}
      OPS_TASK_ID: ${{ github.event.client_payload.taskId }}
      OPS_ACTION_TYPE: ${{ github.event.client_payload.actionType }}
      OPS_EXPORT_BASE_URL: ${{ secrets.OPS_EXPORT_BASE_URL }}
      ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}
      OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
      OPENAI_CODEX_MODEL: ${{ secrets.OPENAI_CODEX_MODEL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ops request
        run: node scripts/ops-remote-runner.mjs
