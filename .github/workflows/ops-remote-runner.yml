name: Ops Remote Runner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - ops-execution-request

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ops-remote-runner-website
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name != 'repository_dispatch' || github.event.client_payload.repoKey == 'website'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mask runtime secrets
        env:
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN || github.event.client_payload.adminToken }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || github.event.client_payload.openAiApiKey }}
          OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID || github.event.client_payload.openAiOrgId }}
          OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID || github.event.client_payload.openAiProjectId }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || github.event.client_payload.cloudflareApiToken }}
        run: |
          for value in "$ADMIN_SYNC_TOKEN" "$OPENAI_API_KEY" "$OPENAI_ORG_ID" "$OPENAI_PROJECT_ID" "$CLOUDFLARE_API_TOKEN"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Process one confirmed request
        env:
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN || github.event.client_payload.adminToken }}
          OPS_EXPORT_BASE_URL: ${{ secrets.OPS_EXPORT_BASE_URL || github.event.client_payload.opsBaseUrl }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || github.event.client_payload.openAiApiKey }}
          OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID || github.event.client_payload.openAiOrgId }}
          OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID || github.event.client_payload.openAiProjectId }}
          OPENAI_CODEX_MODEL: ${{ secrets.OPENAI_CODEX_MODEL || github.event.client_payload.openAiCodexModel }}
          OPS_EXECUTOR_RUNNER_ID: github-actions-website
          GITHUB_TOKEN: ${{ github.token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || github.event.client_payload.cloudflareApiToken }}
        run: node .github/scripts/ops-remote-runner.mjs
