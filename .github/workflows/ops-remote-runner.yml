name: Ops Remote Runner

on:
  push:
    paths:
      - '.github/workflows/ops-remote-runner.yml'
      - '.github/scripts/ops-remote-runner.mjs'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types:
      - ops-execution-request

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ops-remote-runner-website
  cancel-in-progress: false

jobs:
  run:
    if: github.event_name != 'repository_dispatch' || github.event.client_payload.repoKey == 'website'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Process one confirmed request
        env:
          OPS_EXPORT_BASE_URL: ${{ vars.OPS_EXPORT_BASE_URL || github.event.client_payload.opsBaseUrl || 'https://fourteen-wallet-api-7af291023d36.herokuapp.com' }}
          OPS_GITHUB_OIDC_AUDIENCE: ${{ vars.OPS_GITHUB_OIDC_AUDIENCE || '4teen-ops-runner' }}
          OPS_EXECUTOR_RUNNER_ID: github-actions-website
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/ops-remote-runner.mjs
