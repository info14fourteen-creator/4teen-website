name: Daily Blog Publish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/daily-blog-publish.yml
      - .npmrc
      - scripts/blog-automation/daily-digest-runner.mjs
  schedule:
    - cron: '30 6 * * *'
  repository_dispatch:
    types:
      - daily-blog-publish
  workflow_dispatch:
    inputs:
      run_date:
        description: Optional YYYY-MM-DD override
        required: false
        type: string
      force:
        description: Force publish even if the day already has a post
        required: false
        default: false
        type: boolean
      skip_deploy:
        description: Skip Cloudflare deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=4096
      BLOG_CONTENT_SOURCE: snapshot
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BLOG_DATABASE_URL: ""
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ORG_ID: ${{ secrets.OPENAI_ORG_ID }}
      OPENAI_PROJECT_ID: ${{ secrets.OPENAI_PROJECT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DAILY_DIGEST_FEED_URL: ""
      DAILY_DIGEST_WRITER_MODEL: gpt-5.5
      DAILY_DIGEST_WRITER_EFFORT: high
      DAILY_DIGEST_TRIAGE_MODEL: gpt-5-nano
      DAILY_DIGEST_ANALYSIS_MODEL: gpt-5-mini
      DAILY_DIGEST_METADATA_MODEL: gpt-5-nano
      DAILY_DIGEST_IMAGE_MODE: openai-generate
      DAILY_DIGEST_SCAN_ARTICLES: "24"
      DAILY_DIGEST_DEEP_ANALYSIS_ARTICLES: "8"
      DAILY_DIGEST_MAX_ARTICLES: "12"
      DAILY_DIGEST_LOOKBACK_HOURS: "24"
      DAILY_DIGEST_SIGNATURE: Stan At, 4teen Founder
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply event overrides
        shell: bash
        run: |
          set -euo pipefail

          echo "DAILY_DIGEST_RESULT_PATH=${RUNNER_TEMP}/daily-blog-result.json" >> "${GITHUB_ENV}"

          node - <<'NODE'
          const fs = require('node:fs');

          const eventName = process.env.GITHUB_EVENT_NAME ?? '';
          const eventPath = process.env.GITHUB_EVENT_PATH ?? '';
          const envPath = process.env.GITHUB_ENV;

          const eventPayload = eventPath ? JSON.parse(fs.readFileSync(eventPath, 'utf8')) : {};
          const clientPayload = eventName === 'repository_dispatch' ? (eventPayload.client_payload ?? {}) : {};
          const inputs = eventName === 'workflow_dispatch' ? (eventPayload.inputs ?? {}) : {};

          const envOverrides = new Map();

          const setString = (envName, value) => {
            if (typeof value === 'string' && value.trim()) {
              envOverrides.set(envName, value.trim());
            }
          };

          const setBoolean = (envName, value) => {
            if (typeof value === 'boolean') {
              envOverrides.set(envName, value ? 'true' : 'false');
              return;
            }

            if (typeof value === 'string' && value.trim()) {
              envOverrides.set(envName, value.trim().toLowerCase() === 'true' ? 'true' : 'false');
            }
          };

          setString('DATABASE_URL', clientPayload.databaseUrl);
          setString('BLOG_DATABASE_URL', clientPayload.blogDatabaseUrl);
          setString('OPENAI_API_KEY', clientPayload.openAiApiKey);
          setString('OPENAI_ORG_ID', clientPayload.openAiOrgId);
          setString('OPENAI_PROJECT_ID', clientPayload.openAiProjectId);
          setString('CLOUDFLARE_API_TOKEN', clientPayload.cloudflareApiToken);
          setString('DAILY_DIGEST_FEED_URL', clientPayload.feedUrl);
          setString('DAILY_DIGEST_WRITER_MODEL', clientPayload.writerModel);
          setString('DAILY_DIGEST_WRITER_EFFORT', clientPayload.writerEffort);
          setString('DAILY_DIGEST_TRIAGE_MODEL', clientPayload.triageModel);
          setString('DAILY_DIGEST_ANALYSIS_MODEL', clientPayload.analysisModel);
          setString('DAILY_DIGEST_METADATA_MODEL', clientPayload.metadataModel);
          setString('DAILY_DIGEST_IMAGE_MODE', clientPayload.imageMode);
          setString('DAILY_DIGEST_SCAN_ARTICLES', clientPayload.scanArticles);
          setString('DAILY_DIGEST_DEEP_ANALYSIS_ARTICLES', clientPayload.deepAnalysisArticles);
          setString('DAILY_DIGEST_MAX_ARTICLES', clientPayload.maxArticles);
          setString('DAILY_DIGEST_LOOKBACK_HOURS', clientPayload.lookbackHours);
          setString('DAILY_DIGEST_SIGNATURE', clientPayload.signature);
          setString('DAILY_DIGEST_EVENT_RUN_DATE', clientPayload.runDate);
          setBoolean('DAILY_DIGEST_EVENT_FORCE', clientPayload.force);
          setBoolean('DAILY_DIGEST_EVENT_SKIP_DEPLOY', clientPayload.skipDeploy);

          setString('DAILY_DIGEST_EVENT_RUN_DATE', inputs.run_date);
          setBoolean('DAILY_DIGEST_EVENT_FORCE', inputs.force);
          setBoolean('DAILY_DIGEST_EVENT_SKIP_DEPLOY', inputs.skip_deploy);

          if (!envPath || envOverrides.size === 0) {
            process.exit(0);
          }

          const lines = [];
          for (const [key, value] of envOverrides.entries()) {
            lines.push(`${key}=${value}`);
          }

          fs.appendFileSync(envPath, `${lines.join('\n')}\n`);
          NODE

      - name: Publish daily article
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          args=(--skip-notify)
          skip_deploy_value="false"

          run_date="${DAILY_DIGEST_EVENT_RUN_DATE:-}"
          if [ -n "${run_date}" ]; then
            args+=(--date "${run_date}")
          fi

          force_flag="${DAILY_DIGEST_EVENT_FORCE:-false}"
          if [ "${force_flag}" = "true" ]; then
            args+=(--force)
          fi

          skip_deploy_flag="${DAILY_DIGEST_EVENT_SKIP_DEPLOY:-false}"
          if [ "${skip_deploy_flag}" = "true" ]; then
            args+=(--skip-deploy)
            skip_deploy_value="true"
          fi

          node scripts/blog-automation/daily-digest-runner.mjs "${args[@]}"
          echo "skip_deploy=${skip_deploy_value}" >> "$GITHUB_OUTPUT"

      - name: Print publish result
        if: always()
        run: |
          if [ -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            cat "${DAILY_DIGEST_RESULT_PATH}"
          else
            echo "No publish result file found"
          fi

      - name: Confirm deployed article is live
        if: steps.publish.outputs.skip_deploy != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            echo "Publish result file is missing"
            exit 1
          fi

          digest_url="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.digestUrl){process.exit(1)}; process.stdout.write(payload.digestUrl)")"

          attempts=12
          delay=10

          for attempt in $(seq 1 "${attempts}"); do
            if curl --fail --silent --show-error --location "${digest_url}" > /dev/null; then
              echo "Digest is live: ${digest_url}"
              exit 0
            fi

            if [ "${attempt}" -lt "${attempts}" ]; then
              echo "Digest not live yet, retry ${attempt}/${attempts}..."
              sleep "${delay}"
            fi
          done

          echo "Digest did not become live after deploy: ${digest_url}"
          exit 1

      - name: Persist digest snapshot and assets
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            echo "Publish result file is missing"
            exit 1
          fi

          slug="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.slug){process.exit(1)}; process.stdout.write(payload.slug)")"
          run_date="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.runDate){process.exit(1)}; process.stdout.write(payload.runDate)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add scripts/blog-migration/out/content-table/blog-import.bundle.json
          if [ -d "public/blog/digests/${run_date}/${slug}" ]; then
            git add "public/blog/digests/${run_date}/${slug}"
          fi

          if git diff --cached --quiet; then
            echo "No generated digest artifacts to commit"
            exit 0
          fi

          git commit -m "Persist daily digest artifacts for ${run_date} [skip ci]"
          git push origin HEAD:main
