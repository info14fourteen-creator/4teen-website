name: Daily Blog Publish

on:
  schedule:
    - cron: '30 6 * * *'
  repository_dispatch:
    types:
      - daily-blog-publish
  workflow_dispatch:
    inputs:
      run_date:
        description: Optional YYYY-MM-DD override
        required: false
        type: string
      force:
        description: Force publish even if the day already has a post
        required: false
        default: false
        type: boolean
      skip_deploy:
        description: Skip Cloudflare deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: --max-old-space-size=4096
      BLOG_CONTENT_SOURCE: snapshot
      DATABASE_URL: ${{ github.event.client_payload.databaseUrl || secrets.DATABASE_URL }}
      BLOG_DATABASE_URL: ${{ github.event.client_payload.blogDatabaseUrl || '' }}
      OPENAI_API_KEY: ${{ github.event.client_payload.openAiApiKey || secrets.OPENAI_API_KEY }}
      OPENAI_ORG_ID: ${{ github.event.client_payload.openAiOrgId || secrets.OPENAI_ORG_ID }}
      OPENAI_PROJECT_ID: ${{ github.event.client_payload.openAiProjectId || secrets.OPENAI_PROJECT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ github.event.client_payload.cloudflareApiToken || secrets.CLOUDFLARE_API_TOKEN }}
      DAILY_DIGEST_FEED_URL: ${{ github.event.client_payload.feedUrl || '' }}
      DAILY_DIGEST_WRITER_MODEL: ${{ github.event.client_payload.writerModel || 'gpt-5.5' }}
      DAILY_DIGEST_WRITER_EFFORT: ${{ github.event.client_payload.writerEffort || 'high' }}
      DAILY_DIGEST_TRIAGE_MODEL: ${{ github.event.client_payload.triageModel || 'gpt-5-nano' }}
      DAILY_DIGEST_ANALYSIS_MODEL: ${{ github.event.client_payload.analysisModel || 'gpt-5-mini' }}
      DAILY_DIGEST_METADATA_MODEL: ${{ github.event.client_payload.metadataModel || 'gpt-5-nano' }}
      DAILY_DIGEST_IMAGE_MODE: ${{ github.event.client_payload.imageMode || 'openai-generate' }}
      DAILY_DIGEST_SCAN_ARTICLES: ${{ github.event.client_payload.scanArticles || '24' }}
      DAILY_DIGEST_DEEP_ANALYSIS_ARTICLES: ${{ github.event.client_payload.deepAnalysisArticles || '8' }}
      DAILY_DIGEST_MAX_ARTICLES: ${{ github.event.client_payload.maxArticles || '12' }}
      DAILY_DIGEST_LOOKBACK_HOURS: ${{ github.event.client_payload.lookbackHours || '24' }}
      DAILY_DIGEST_SIGNATURE: ${{ github.event.client_payload.signature || 'Stan At, 4teen Founder' }}
      DAILY_DIGEST_RESULT_PATH: ${{ runner.temp }}/daily-blog-result.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish daily article
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          args=(--skip-notify)
          skip_deploy_value="false"

          run_date="${{ github.event.client_payload.runDate || inputs.run_date }}"
          if [ -n "${run_date}" ]; then
            args+=(--date "${run_date}")
          fi

          force_flag="${{ github.event.client_payload.force || inputs.force || false }}"
          if [ "${force_flag}" = "true" ]; then
            args+=(--force)
          fi

          skip_deploy_flag="${{ github.event.client_payload.skipDeploy || inputs.skip_deploy || false }}"
          if [ "${skip_deploy_flag}" = "true" ]; then
            args+=(--skip-deploy)
            skip_deploy_value="true"
          fi

          node scripts/blog-automation/daily-digest-runner.mjs "${args[@]}"
          echo "skip_deploy=${skip_deploy_value}" >> "$GITHUB_OUTPUT"

      - name: Print publish result
        if: always()
        run: |
          if [ -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            cat "${DAILY_DIGEST_RESULT_PATH}"
          else
            echo "No publish result file found"
          fi

      - name: Confirm deployed article is live
        if: steps.publish.outputs.skip_deploy != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            echo "Publish result file is missing"
            exit 1
          fi

          digest_url="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.digestUrl){process.exit(1)}; process.stdout.write(payload.digestUrl)")"

          attempts=12
          delay=10

          for attempt in $(seq 1 "${attempts}"); do
            if curl --fail --silent --show-error --location "${digest_url}" > /dev/null; then
              echo "Digest is live: ${digest_url}"
              exit 0
            fi

            if [ "${attempt}" -lt "${attempts}" ]; then
              echo "Digest not live yet, retry ${attempt}/${attempts}..."
              sleep "${delay}"
            fi
          done

          echo "Digest did not become live after deploy: ${digest_url}"
          exit 1

      - name: Persist digest snapshot and assets
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DAILY_DIGEST_RESULT_PATH}" ]; then
            echo "Publish result file is missing"
            exit 1
          fi

          slug="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.slug){process.exit(1)}; process.stdout.write(payload.slug)")"
          run_date="$(node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync(process.env.DAILY_DIGEST_RESULT_PATH,'utf8')); if(!payload.runDate){process.exit(1)}; process.stdout.write(payload.runDate)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add scripts/blog-migration/out/content-table/blog-import.bundle.json
          if [ -d "public/blog/digests/${run_date}/${slug}" ]; then
            git add "public/blog/digests/${run_date}/${slug}"
          fi

          if git diff --cached --quiet; then
            echo "No generated digest artifacts to commit"
            exit 0
          fi

          git commit -m "Persist daily digest artifacts for ${run_date} [skip ci]"
          git push origin HEAD:main
